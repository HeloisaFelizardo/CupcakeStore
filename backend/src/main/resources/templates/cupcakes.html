<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <title>Cupcake Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="layout :: menu"></div>
<div class="container mt-4">
    <h1 class="mb-4">Lista de Cupcakes</h1>
    <div class="row">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4" th:each="cupcake : ${cupcakes}">
            <div class="card h-100 shadow-sm">
                <img th:src="${cupcake.imagemUrl}" class="card-img-top" alt="Cupcake">

                <div class="card-body">
                    <h5 class="card-title" th:text="${cupcake.nome}"></h5>
                    <p class="card-text" th:text="${cupcake.descricao}"></p>
                    <p class="fw-bold" th:text="'R$ ' + ${cupcake.preco}"></p>

                    <!-- QUANTIDADE -->
                    <div class="input-group mb-2" style="max-width: 120px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="diminuir(this)">-</button>
                        <input type="text" class="form-control text-center" value="1">
                        <button class="btn btn-outline-secondary" type="button" onclick="aumentar(this)">+</button>
                    </div>

                    <!-- BOTÃO -->
                    <button class="btn btn-primary w-100">
                        Adicionar ao carrinho
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function aumentar(btn) {
        const input = btn.parentElement.querySelector("input");
        input.value = parseInt(input.value) + 1;
    }

    function diminuir(btn) {
        const input = btn.parentElement.querySelector("input");
        let valor = parseInt(input.value);

        if (valor > 1) {
            input.value = valor - 1;
        }
    }
</script>
</body>
</html>
