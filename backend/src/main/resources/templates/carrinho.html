<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <title>Cupcake Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="layout :: menu"></div>
<div class="container-fluid px-3 mt-4">

    <h2 class="mb-4">🛒 Seu Carrinho</h2>

    <!-- CARRINHO VAZIO -->
    <div th:if="${#lists.isEmpty(pedido.itens)}" class="text-center mt-5">
        <img src="/images/empty-cart.png" width="180" class="mb-3">
        <h4>Seu carrinho está vazio</h4>
        <p class="text-muted">Adicione cupcakes deliciosos 🍰</p>
        <a href="/" class="btn btn-primary mt-3">Ver produtos</a>
    </div>

    <!-- LISTA DE ITENS -->
    <div th:if="${!#lists.isEmpty(pedido.itens)}">

        <div class="card mb-3 shadow-sm" th:each="item : ${pedido.itens}">

            <div class="d-flex flex-column flex-md-row align-items-center p-3 gap-3">

                <!-- IMAGEM -->
                <img th:src="${item.cupcake.imagemUrl}"
                     class="cart-img">

                <!-- INFO -->
                <div class="flex-grow-1 text-center text-md-start">
                    <h6 class="mb-1" th:text="${item.cupcake.nome}"></h6>
                    <small class="text-muted d-block"
                           th:text="${item.cupcake.descricao}"></small>

                    <span class="d-block mt-1">
                Qtd: <strong th:text="${item.quantidade}"></strong>
            </span>
                </div>

                <!-- PREÇO + REMOVER -->
                <div class="text-center text-md-end">

                    <p class="fw-bold mb-2"
                       th:text="'R$ ' + ${item.subtotal}"></p>

                    <form th:action="@{/pedido/remover}" method="post">
                        <input type="hidden" name="id"
                               th:value="${item.cupcake.id}">
                        <button class="btn btn-outline-danger btn-sm">
                            Remover
                        </button>
                    </form>

                </div>

            </div>

        </div>

        <!-- TOTAL -->
        <div class="card p-3 shadow-sm mt-4">

            <h4 class="text-end">
                Total: <span th:text="'R$ ' + ${pedido.valorTotal}"></span>
            </h4>

            <div class="text-end">
                <button class="btn btn-success mt-3 px-6" onclick="alert('Pedido finalizado!')">
                    Finalizar Pedido
                </button>
            </div>

        </div>

    </div>
</div>
</body>
</html>
