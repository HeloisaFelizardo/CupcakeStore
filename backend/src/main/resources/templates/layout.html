<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
    <head>
        <title>Cupcake Store</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <!-- CSS -->
        <link rel="stylesheet" th:href="@{/css/style.css}" />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    </head>

    <body>
        <div th:fragment="menu">
            <nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
                <a class="navbar-brand" href="/">🧁 Cupcake Store</a>

                <div class="ms-auto">
                    <a class="nav-link d-inline" href="/">Cupcakes</a>
                    |
                    <a class="nav-link d-inline" href="/login">Login</a>
                    |
                    <a class="nav-link d-inline position-relative" href="/pedido">
                        Carrinho
                        <span th:if="${quantidadeCarrinho > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            <span th:text="${quantidadeCarrinho}"></span>
                        </span>
                    </a>
                </div>
            </nav>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
